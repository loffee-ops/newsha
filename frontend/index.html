<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Newsha</title>

        <style>
            :root {
                --loader-text: rgb(124, 124, 124);
                --loader-accent: #956afa;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            #root {
                min-height: 100vh;
            }

            .page-loader {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: transparent;
                opacity: 1;
                visibility: visible;
                transition:
                    opacity 0.35s ease,
                    visibility 0.35s ease;
            }

            .page-loader.is-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .page-loader__content {
                height: 40px;
                display: flex;
                align-items: center;
                color: var(--loader-text);
                font-size: 25px;
                font-weight: 500;
                line-height: 1;
            }

            .page-loader__label {
                flex-shrink: 0;
            }

            .page-loader__words {
                overflow: hidden;
                height: 40px;
                margin-left: 6px;
            }

            .page-loader__word {
                display: block;
                height: 40px;
                line-height: 40px;
                color: var(--loader-accent);
                animation: loaderWords 4s infinite;
            }

            @keyframes loaderWords {
                10% {
                    transform: translateY(-102%);
                }

                25% {
                    transform: translateY(-100%);
                }

                35% {
                    transform: translateY(-202%);
                }

                50% {
                    transform: translateY(-200%);
                }

                60% {
                    transform: translateY(-302%);
                }

                75% {
                    transform: translateY(-300%);
                }

                85% {
                    transform: translateY(-402%);
                }

                100% {
                    transform: translateY(-400%);
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="startup-loader" class="page-loader">
                <div class="page-loader__content">
                    <p class="page-loader__label">Загружаємо</p>
                    <div class="page-loader__words">
                        <span class="page-loader__word">сайт</span>
                        <span class="page-loader__word">категорії</span>
                        <span class="page-loader__word">товари</span>
                        <span class="page-loader__word">акції</span>
                        <span class="page-loader__word">подарунки</span>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
